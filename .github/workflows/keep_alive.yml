name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -I https://balkanji-backend-ai5a.onrender.com/health/
          curl -I https://balkanji-backend-ai5a.onrender.com/ping/
      
      - name: Ping Frontend
        run: |
          curl -I https://balkanji-nadiad-2026.vercel.app/ 
          # Assuming Vercel, but pinging it anyway helps keep the whole "system" perceived as active
